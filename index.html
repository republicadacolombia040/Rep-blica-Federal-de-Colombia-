<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Citizen Portfolio</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
}

/* HEADER */
.header {
  width: 100%;
  background: #0033a0;
  color: white;
  text-align: center;
  padding: 15px 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.header img {
  width: 60px;
  display: block;
  margin: 0 auto 5px;
}

.header h2 {
  margin: 0;
  font-size: 22px;
}

.header h1 {
  margin: 5px 0 0;
  font-size: 26px;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 600px;
  margin: 20px auto;
  background: white;
  padding: 15px;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  text-align: center;
}

/* IMAGE FULL WIDTH */
.id-image {
  width: 100%;
  height: auto;
  border-radius: 10px;
  margin-top: 10px;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 14px;
  color: #555;
}
</style>
</head>

<body>

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/21/Coat_of_arms_of_Colombia.svg/200px-Coat_of_arms_of_Colombia.svg.png" alt="Colombia Coat of Arms">

<div class="container">
  <h2>Government of Colombia</h2>

  <!-- Your image -->
  <img src="image.png" alt="ID Image" class="id-image">

  <div class="footer">
    Verified Identity Record • Migration Office
  </div>
</div>

</body>
</html>
