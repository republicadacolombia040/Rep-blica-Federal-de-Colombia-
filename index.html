<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Citizen Portfolio</title>

<!-- Official-style font -->
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Roboto Slab', serif;
  background: #e9eef5;
}

/* HEADER */
.header {
  background: #002b5c;
  color: white;
  text-align: center;
  padding: 20px 10px;
  border-bottom: 5px solid #caa400;
}

/* LOGO */
.header a img {
  width: 70px;
  height: auto;
  margin-bottom: 8px;
  transition: 0.3s ease;
}

.header a img:hover {
  transform: scale(1.05);
}

.header h2 {
  margin: 0;
  font-size: 18px;
  letter-spacing: 1px;
  text-transform: uppercase;
  opacity: 0.9;
}

.header h1 {
  margin: 8px 0 0;
  font-size: 30px;
  font-weight: 800;
  letter-spacing: 1px;
}

/* MAIN CARD */
.container {
  max-width: 650px;
  margin: 25px auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
  border-top: 4px solid #002b5c;
}

.container h2 {
  font-weight: 800;
  color: #002b5c;
  margin-bottom: 15px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ID IMAGE */
.id-image {
  width: 100%;
  border-radius: 10px;
  border: 2px solid #ddd;
  margin-top: 10px;
}

/* FOOTER */
.footer {
  margin-top: 15px;
  font-size: 13px;
  color: #555;
  border-top: 1px solid #ddd;
  padding-top: 10px;
  font-style: italic;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <!-- Local logo + Wikipedia link -->
  <a href="https://en.wikipedia.org/wiki/Coat_of_arms_of_Colombia" target="_blank">
    <img src="logo.png" alt="Coat of Arms">
  </a>

  <h2>Republic of Colombia</h2>
  <h1>CITIZEN PORTFOLIO</h1>
</div>

<!-- MAIN CONTENT -->
<div class="container">
  <h2>Government Identity Record</h2>

  <!-- ID IMAGE -->
  <img src="image.png" alt="Citizen ID" class="id-image">

  <div class="footer">
    Official Verification System • National Registry Authority
  </div>
</div>

</body>
</html>
